<div class="pagina-central">

  <div class="cabecalho-pagina">
    <h1 class="titulo-pagina">Central do usuário</h1>
  </div>

  <div class="card-formulario">

    <div class="boas-vindas">
      <h2>Bem-vindo, {{ usuario?.nome }}!</h2>
      <p>Verifique as informações da sua conta no sistema LENPA.</p>
    </div>

    <div class="lista-credenciais">

      <div class="campo">
        <label>Nome da conta:</label>
        <div class="input-falso">
          <span>{{ usuario?.nome }}</span>
          <svg class="icone-lapis" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><path d="M92.69,216H48a8,8,0,0,1-8-8V163.31a8,8,0,0,1,2.34-5.65L165.66,34.34a8,8,0,0,1,11.31,0L221.66,79a8,8,0,0,1,0,11.31L98.34,213.66A8,8,0,0,1,92.69,216Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="136" y1="64" x2="192" y2="120" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>
        </div>
      </div>

      <div class="campo">
        <label>E-mail:</label>
        <div class="input-falso">
          <span>{{ usuario?.email }}</span>
          <svg class="icone-lapis" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><path d="M92.69,216H48a8,8,0,0,1-8-8V163.31a8,8,0,0,1,2.34-5.65L165.66,34.34a8,8,0,0,1,11.31,0L221.66,79a8,8,0,0,1,0,11.31L98.34,213.66A8,8,0,0,1,92.69,216Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="136" y1="64" x2="192" y2="120" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>
        </div>
      </div>

      <div class="campo">
        <label>Senha:</label>
        <div class="input-falso">
          <span>********</span>
          <svg class="icone-lapis" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><path d="M92.69,216H48a8,8,0,0,1-8-8V163.31a8,8,0,0,1,2.34-5.65L165.66,34.34a8,8,0,0,1,11.31,0L221.66,79a8,8,0,0,1,0,11.31L98.34,213.66A8,8,0,0,1,92.69,216Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="136" y1="64" x2="192" y2="120" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>
        </div>
      </div>

      <div class="campo">
        <label>Nível de permissão:</label>
        <div class="input-falso">
          <span>{{ usuario?.role }}</span>
        </div>
      </div>

      <button class="btn-sair-lista" (click)="abrirModalSair()">Sair</button>

    </div>

  </div>

  <button class="btn-flutuante-cadastrar">
    <span class="texto-fab">Cadastrar novo usuário</span>
    <div class="icone-fab">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><line x1="200" y1="136" x2="248" y2="136" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="224" y1="112" x2="224" y2="160" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><circle cx="108" cy="100" r="60" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><path d="M24,200c20.55-24.45,49.56-40,84-40s63.45,15.55,84,40" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>
    </div>
  </button>

  <div class="modal-overlay" *ngIf="exibirModalSair" (click)="fecharModalSair()">
    <div class="modal-confirmacao" (click)="$event.stopPropagation()">
      <h2>Deseja sair?</h2>
      <p>Você precisará fazer login novamente para acessar o sistema.</p>
      <div class="botoes-confirmacao">
        <button class="btn-voltar" (click)="fecharModalSair()">Voltar</button>
        <button class="btn-confirmar-sair" (click)="confirmarSair()">Sim, sair</button>
      </div>
    </div>
  </div>

</div>
